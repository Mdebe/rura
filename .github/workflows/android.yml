name: Flutter Android Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk georura.apk
          ls -lh georura.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: georura-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/georura.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/georura.apk
          name: Georura v${{ steps.version.outputs.version }}
          body: |
            ## Georura v${{ steps.version.outputs.version }}
            
            ### Download
            **georura.apk** - Universal APK, works on all Android devices
            
            ### Install
            1. Download `georura.apk` 
            2. Open the file on your Android device
            3. Allow "Install from unknown sources" if prompted
            4. Tap Install
            
            Compatible with Android 5.0+ (API 21+)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}