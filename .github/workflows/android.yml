name: Flutter Android Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

 
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          # Universal APK
          cp app-release.apk georura.apk
          cp app-release.apk georura-v${{ steps.version.outputs.version }}-universal.apk
          
          # Split APKs - only rename if they exist
          [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk georura-v${{ steps.version.outputs.version }}-arm64.apk
          [ -f app-armeabi-v7a-release.apk ] && mv app-armeabi-v7a-release.apk georura-v${{ steps.version.outputs.version }}-arm.apk
          [ -f app-x86_64-release.apk ] && mv app-x86_64-release.apk georura-v${{ steps.version.outputs.version }}-x64.apk
          
          ls -lh georura*.apk

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Georura-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/georura*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/georura*.apk
          name: Georura v${{ steps.version.outputs.version }}
          body: |
            ## Georura v${{ steps.version.outputs.version }}
            
            ### Downloads
            - **georura.apk** - Universal APK, works on all devices
            - **georura-v${{ steps.version.outputs.version }}-universal.apk** - Same as above, versioned
            - **georura-v${{ steps.version.outputs.version }}-arm64.apk** - For modern phones (recommended, smaller)
            - **georura-v${{ steps.version.outputs.version }}-arm.apk** - For older 32-bit devices
            - **georura-v${{ steps.version.outputs.version }}-x64.apk** - For x86 emulators
            
            ### Install
            Download `georura.apk` for most devices. Use the arm64 version if you know your phone supports it for a smaller download.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}